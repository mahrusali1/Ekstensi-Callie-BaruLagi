name: Build Extension
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Set up JDK 8
        uses: actions/setup-java@v2
        with:
          java-version: '8'
          distribution: 'adopt'
          
      - name: Build with Ant
        run: ant extensions
        
      - name: Upload AIX
        uses: actions/upload-artifact@v2
        with:
          name: BaruLagi-Extension
          path: out/*.aix
